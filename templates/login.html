{% extends "layout.html" %}

{% block title %}Login — Book Reviews{% endblock %}

{% block body %}
<div class="page-content">
  <div class="container" style="display:flex;justify-content:center;">
    <div class="form-card">
      <h2>Welcome back</h2>
      <p class="form-subtitle">Sign in to access your account</p>

      <form action="/login" method="post">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />
        <div class="form-group">
          <label for="login-email">Email</label>
          <input id="login-email" name="email" class="form-control" type="email" placeholder="you@example.com" required />
        </div>

        <div class="form-group">
          <label for="login-password">Password</label>
          <input id="login-password" name="password" class="form-control" type="password" placeholder="••••••••" required />
        </div>

        <button type="submit" class="btn btn-primary" style="width:100%;">Login</button>
      </form>

      <div class="form-footer">
        Don't have an account? <a href="{{ url_for('register') }}">Sign up</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
