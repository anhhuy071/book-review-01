{% extends "layout.html" %}

{% block title %}Sign Up — Book Reviews{% endblock %}

{% block body %}
<div class="page-content">
  <div class="container" style="display:flex;justify-content:center;">
    <div class="form-card">
      <h2>Create account</h2>
      <p class="form-subtitle">Sign up to start discovering and reviewing books</p>

      <form action="/register" method="post">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />
        <div class="form-row">
          <div class="form-group">
            <label for="reg-first">First name</label>
            <input id="reg-first" name="first_name" class="form-control" type="text" placeholder="Jane" required />
          </div>
          <div class="form-group">
            <label for="reg-last">Last name</label>
            <input id="reg-last" name="last_name" class="form-control" type="text" placeholder="Doe" required />
          </div>
        </div>

        <div class="form-group">
          <label for="reg-email">Email</label>
          <input id="reg-email" name="email" class="form-control" type="email" placeholder="you@example.com" required />
        </div>

        <div class="form-group">
          <label for="reg-pass1">Password</label>
          <input id="reg-pass1" name="password1" class="form-control" type="password" placeholder="••••••••" required />
        </div>

        <div class="form-group">
          <label for="reg-pass2">Confirm password</label>
          <input id="reg-pass2" name="password2" class="form-control" type="password" placeholder="••••••••" required />
        </div>

        <button type="submit" class="btn btn-primary" style="width:100%;">Create Account</button>
      </form>

      <div class="form-footer">
        Already have an account? <a href="{{ url_for('login') }}">Sign in</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
